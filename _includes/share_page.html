<!-- Load Facebook SDK for JavaScript -->
<div id="fb-root"></div>
<script>
  (function(d, s, id) {
    var js,
      fjs = d.getElementsByTagName(s)[0];
    if (d.getElementById(id)) return;
    js = d.createElement(s);
    js.id = id;
    js.src = "https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v3.0";
    fjs.parentNode.insertBefore(js, fjs);
  })(document, "script", "facebook-jssdk");
</script>
  <script
  async
  src="https://platform.twitter.com/widgets.js"
  charset="utf-8"
></script>

<div class="share-page">
  <p class="share-text">Share this on &rarr;</p>
  <a
    href="https://twitter.com/share?ref_src=twsrc%5Etfw"
    class="twitter-share-button"
    data-size="large"
    data-show-count="false"
    >Tweet</a
  >
  <a
    class="fb-share-button"
    data-href="{{site.url}}{{page.url}}"
    data-size="large"
    data-layout="button"
  >Share</a>
  <a
    href="https://www.linkedin.com/sharing/share-offsite/?url={{site.url}}{{page.url}}"
    target="_blank"
    rel="noopener noreferrer"
    class="linkedin-share-button"
    style="display:inline-flex; align-items:center; padding:0 8px; background-color:#0077B5; color:#fff; text-decoration:none; border-radius:3px; font-size:12px; font-weight:bold; height:28px; box-sizing:border-box;"
  >
    <i class="fab fa-linkedin" style="margin-right:4px;"></i>Share
  </a>
</div>
